name: Build and Push Frontend Image

# מתי ה-CI הזה ירוץ?
on:
  push:
    branches: [ "main" ]
    # פילטר קריטי: ירוץ רק אם שינית משהו בתוך תיקיית הפרונטאנד!
    paths:
      - 'CliXLuster-FE/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. משיכת הקוד שלך מהמאגר לתוך שרת ה-CI
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. התחברות ל-DockerHub בעזרת הסודות שהגדרנו
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. הגדרת כלי הבנייה (עוזר לבנות אימג'ים מהר יותר)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. בניית האימג' ודחיפה ל-Registry
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./CliXLuster-FE
          file: ./CliXLuster-FE/Dockerfile
          push: true
          # תחליף כאן את YOUR_NAMESPACE בשם המשתמש שלך ב-DockerHub
          # ואת clixluster-frontend בשם ה-Repo שיצרת ב-DockerHub
          tags: ido1t7/clixluster-frontend:latest